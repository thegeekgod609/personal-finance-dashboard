function b642ab(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

async function deriveKey(password, salt, iterations){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations, hash:'SHA-256' },
    keyMaterial,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
}

async function tryUnlock(){
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';
  try{
    const salt = new Uint8Array(b642ab(PAYLOAD.salt));
    const iv = new Uint8Array(b642ab(PAYLOAD.iv));
    const ct = b642ab(PAYLOAD.ct);
    const key = await deriveKey(pw, salt, PAYLOAD.iter);
    const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    const html = new TextDecoder().decode(plainBuf);
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    errEl.style.display = 'block';
  }
}

document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryUnlock(); });
</script>
